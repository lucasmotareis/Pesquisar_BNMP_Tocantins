services:
  painel-bnmp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - bnmp-browser
    environment:
      TZ: America/Sao_Paulo
      BNMP_DATA_DIR: /app/data
      BNMP_DATA_FILE: /app/data/mandados_processados.json
      BNMP_COOKIES_FILE: /app/data/bnmp_cookies.json
      BNMP_BROWSER_EXPORT_URL: http://bnmp-browser:7788/export
      BNMP_BROWSER_EXPORT_TOKEN: "${BNMP_BROWSER_EXPORT_TOKEN:-dev-export-token-change-me}"
      BNMP_REMOTE_BROWSER_URL: "${BNMP_REMOTE_BROWSER_URL:-http://localhost:6080/vnc.html?autoconnect=1&resize=remote}"
      APP_BASIC_AUTH_USER: "${APP_BASIC_AUTH_USER:-}"
      APP_BASIC_AUTH_PASSWORD: "${APP_BASIC_AUTH_PASSWORD:-}"
      BNMP_ENABLE_HSTS: "${BNMP_ENABLE_HSTS:-false}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
      PYTHONUNBUFFERED: "1"
    ports:
      - "${APP_PORT:-8765}:8765"
    volumes:
      - "${BNMP_DATA_PATH:-./data}:/app/data"

  bnmp-browser:
    build:
      context: .
      dockerfile: bnmp_browser/Dockerfile
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      BNMP_PORTAL_URL: "${BNMP_PORTAL_URL:-https://portalbnmp.pdpj.jus.br/#/pesquisa-peca}"
      BNMP_COOKIES_FILE: /app/data/bnmp_cookies.json
      BNMP_BROWSER_EXPORT_TOKEN: "${BNMP_BROWSER_EXPORT_TOKEN:-dev-export-token-change-me}"
      BNMP_VNC_PASSWORD: "${BNMP_VNC_PASSWORD:-dev-vnc-password-change-me}"
      BNMP_BROWSER_COOKIE_WAIT_SECONDS: "${BNMP_BROWSER_COOKIE_WAIT_SECONDS:-12}"
      BNMP_CAPTURED_SESSION_MAX_AGE_SECONDS: "${BNMP_CAPTURED_SESSION_MAX_AGE_SECONDS:-600}"
      SCREEN_WIDTH: "${BNMP_BROWSER_WIDTH:-1366}"
      SCREEN_HEIGHT: "${BNMP_BROWSER_HEIGHT:-768}"
      NOVNC_PORT: "6080"
      EXPORT_PORT: "7788"
      CDP_PORT: "9222"
      PYTHONUNBUFFERED: "1"
    ports:
      - "${BNMP_BROWSER_PORT:-6080}:6080"
    volumes:
      - "${BNMP_DATA_PATH:-./data}:/app/data"
